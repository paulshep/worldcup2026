<html lang="en-GB">
<head>
<meta charset="UTF-8">

<title>Family World Cup Sweepstake 2026</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Archivo+Black&family=Archivo:wght@400;600;700&display=swap');
  :root{
    --pitch:#0A3526; --pitch-line:#1C5A40; --cream:#FBF6EA; --ink:#16241D;
    --gold:#D9A93C; --bubble:#D9FDD3; --bubble-ink:#0B1F14; --muted:#6E7A72;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{
    font-family:'Archivo',system-ui,sans-serif;
    background:repeating-linear-gradient(90deg, transparent 0 88px, rgba(255,255,255,.035) 88px 176px),var(--pitch);
    color:var(--cream); min-height:100vh;
    display:flex; flex-direction:column; align-items:center;
    padding:28px 16px 48px;
  }
  header{text-align:center; margin-bottom:26px; max-width:560px}
  .crest{display:inline-block; border:2px solid var(--gold); border-radius:999px;
    padding:4px 14px; font-size:11px; letter-spacing:.22em; text-transform:uppercase;
    color:var(--gold); margin-bottom:14px;}
  h1{font-family:'Archivo Black',sans-serif; font-size:clamp(28px,7vw,44px);
    line-height:1.02; text-transform:uppercase;}
  h1 .y{color:var(--gold)}
  header p{margin-top:10px; font-size:14px; color:#BFD3C7}
  .card{background:var(--cream); color:var(--ink); width:100%; max-width:560px;
    border-radius:14px; box-shadow:0 14px 40px rgba(0,0,0,.35); padding:22px 20px 26px;}
  .btn-row{display:flex; gap:12px; flex-wrap:wrap}
  button.gen{flex:1 1 200px; font-family:'Archivo Black',sans-serif; font-size:15px;
    text-transform:uppercase; letter-spacing:.05em; padding:16px 12px; border-radius:10px;
    border:none; cursor:pointer; background:var(--pitch); color:var(--cream);
    transition:transform .08s ease, background .15s ease;}
  button.gen:hover{background:var(--pitch-line)}
  button.gen:active{transform:scale(.98)}
  button.gen:disabled{opacity:.55; cursor:wait}
  button.gen:focus-visible,.copy:focus-visible,.roster summary:focus-visible{outline:3px solid var(--gold); outline-offset:2px;}
  button.gen small{display:block; font-family:'Archivo',sans-serif; font-weight:600;
    font-size:11px; text-transform:none; letter-spacing:0; opacity:.75; margin-top:4px}
  .status{margin-top:16px; font-size:13px; color:var(--muted); min-height:18px}
  .chat{margin-top:14px; padding:18px 14px 8px; background:#E7DFD2; border-radius:10px; display:none;}
  .chat.show{display:block}
  .bubble{position:relative; background:var(--bubble); color:var(--bubble-ink);
    border-radius:10px; border-top-left-radius:2px; padding:12px 14px 10px;
    white-space:pre-wrap; font-size:14.5px; line-height:1.5;
    box-shadow:0 1px 1px rgba(0,0,0,.12); word-wrap:break-word;}
  .bubble .tick{display:block; text-align:right; font-size:11px; color:#5BA08B; margin-top:6px;}
  .copy{margin:12px auto 8px; display:block; font-family:'Archivo',sans-serif;
    font-weight:700; font-size:13px; padding:10px 22px; border-radius:999px;
    border:2px solid var(--pitch); background:transparent; color:var(--pitch);
    cursor:pointer; transition:background .15s ease, color .15s ease;}
  .copy:hover{background:var(--pitch); color:var(--cream)}
  .roster{margin-top:22px; border-top:2px dashed #D8CDB8; padding-top:14px}
  .roster summary{cursor:pointer; font-weight:700; font-size:13px; text-transform:uppercase;
    letter-spacing:.08em; color:var(--pitch); list-style:none;}
  .roster summary::before{content:'\25B8 '}
  .roster[open] summary::before{content:'\25BE '}
  .roster table{width:100%; margin-top:10px; border-collapse:collapse; font-size:13.5px}
  .roster td{padding:5px 4px; border-bottom:1px solid #EDE5D4}
  .roster td:first-child{font-weight:700; white-space:nowrap}
  footer{margin-top:22px; font-size:11px; color:#7FA290; text-align:center; max-width:560px}
  @media (prefers-reduced-motion: reduce){ *{transition:none !important} }
</style>
</head>
<body>

<header>
  <div class="crest">USA &middot; Mexico &middot; Canada 2026</div>
  <h1>Family <span class="y">Sweepstake</span><br>Message Maker</h1>
  <p>One tap, one message, straight to the family chat.</p>
</header>

<main class="card">
  <div class="btn-row">
    <button class="gen" id="btnYesterday">Yesterday's results<small>scores + who had each team</small></button>
    <button class="gen" id="btnToday">Today's matches<small>kick-offs in UK time</small></button>
    <button class="gen" id="btnTomorrow">Tomorrow's matches<small>plan ahead — UK times</small></button>
    <button class="gen" id="btnLeaderboard">Leaderboard<small>played, W-D-L, goal difference</small></button>
    <button class="gen" id="btnCommentary">Commentary<small>the beautiful game, in words</small></button>
  </div>
  <div class="status" id="status"></div>

  <div class="chat" id="chat">
    <div class="bubble"><span id="msg"></span><span class="tick">12:00 &#10003;&#10003;</span></div>
    <button class="copy" id="btnCopy">Copy message</button>
  </div>

  <details class="roster">
    <summary>The draw &mdash; 24 players, 48 teams</summary>
    <table id="rosterTable"></table>
  </details>
</main>

<footer>Full fixture list built in. Scores fetched live (direct or via Claude web search). Times in UK time (BST).</footer>

const DATA_URL = "https://raw.githubusercontent.com/openfootball/worldcup.json/master/2026/worldcup.json";

/* ---------- Date helpers (anchored to UK time) ---------- */
function kickoffUTC(m){
  if(!m.d) return null;
  const [y,mo,d] = m.d.split("-").map(Number);
  if(!m.t) return new Date(Date.UTC(y, mo-1, d, 12, 0));
  const t = m.t.match(/(\d{1,2}):(\d{2})/);
  const off = m.t.match(/UTC([+-])(\d{1,2})(?::(\d{2}))?/);
  let h = t ? +t[1] : 12, min = t ? +t[2] : 0, offMin = 0;
  if(off){ offMin = (+off[2])*60 + (off[3]?+off[3]:0); if(off[1]==="-") offMin = -offMin; }
  return new Date(Date.UTC(y, mo-1, d, h, min) - offMin*60000);
}
const ukDateStr = d => new Intl.DateTimeFormat("en-CA",{timeZone:"Europe/London",year:"numeric",month:"2-digit",day:"2-digit"}).format(d);
const ukTime = d => new Intl.DateTimeFormat("en-GB",{timeZone:"Europe/London",hour:"numeric",minute:"2-digit",hour12:true}).format(d).replace(/\s/g,"");
const ukNiceDate = d => new Intl.DateTimeFormat("en-GB",{timeZone:"Europe/London",weekday:"long",day:"numeric",month:"long"}).format(d);

/* ---------- Formatting ---------- */
const teamLabel = n => (FLAGS[n] ? FLAGS[n] + " " + n : n);
const venueLabel = g => g ? g.replace(/\s*\(.*\)\s*$/, "") : "";
function playerNote(t1, t2){
  const p1 = TEAM_TO_PLAYER[t1], p2 = TEAM_TO_PLAYER[t2];
  if(p1 && p2) return p1 === p2 ? "(both " + p1 + "!)" : "(" + p1 + " v " + p2 + ")";
  if(p1) return "(" + p1 + "'s " + t1 + ")";
  if(p2) return "(" + p2 + "'s " + t2 + ")";
  return "";
}

/* ---------- Data: live fetch -> embedded fallback ---------- */
async function loadMatches(){
  try{
    const ctl = new AbortController();
    const timer = setTimeout(() => ctl.abort(), 6000);
    const r = await fetch(DATA_URL, {cache:"no-store", signal:ctl.signal});
    clearTimeout(timer);
    if(!r.ok) throw new Error("HTTP " + r.status);
    const j = await r.json();
    const norm = (j.matches || []).map(m => ({
      d: m.date, t: m.time,
      a: typeof m.team1 === "object" ? m.team1.name : m.team1,
      b: typeof m.team2 === "object" ? m.team2.name : m.team2,
      s: (function(sc){
        if(!sc || !(sc.ft || sc.et)) return undefined;
        let v = (sc.et || sc.ft).slice();
        if(sc.ps) v = v.concat(sc.ps);
        else if(sc.et) v.push("aet");
        return v;
      })(m.score),
      g: m.ground
    }));
    return {matches: norm, live: true};
  }catch(_){
    return {matches: EMBEDDED_MATCHES, live: false};
  }
}

/* ---------- Shared Claude + web-search JSON helper ---------- */
async function askClaudeOnce(prompt, useTools){
  const body = {
    model: "claude-sonnet-4-20250514",
    max_tokens: 1000,
    messages: [{role:"user", content: prompt}]
  };
  if(useTools) body.tools = [{type:"web_search_20250305", name:"web_search"}];
  let resp;
  try{
    resp = await fetch("https://api.anthropic.com/v1/messages", {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify(body)
    });
  }catch(e){ throw new Error("network: " + e.message); }
  const raw = await resp.text();
  if(!resp.ok) throw new Error("HTTP " + resp.status + ": " + raw.slice(0,160));
  let data;
  try{ data = JSON.parse(raw); }catch(_){ throw new Error("non-JSON reply: " + raw.slice(0,160)); }
  if(data.type === "error" || data.error) throw new Error("API error: " + JSON.stringify(data.error || data).slice(0,160));
  const text = (data.content || []).filter(c => c.type === "text").map(c => c.text).join("\n");
  const clean = text.replace(/```json|```/g, "").trim();
  const start = clean.indexOf("["), end = clean.lastIndexOf("]");
  if(start === -1 || end === -1) throw new Error("no JSON array in reply: " + clean.slice(0,120));
  try{ return JSON.parse(clean.slice(start, end + 1)); }
  catch(e){ throw new Error("bad JSON in reply: " + clean.slice(start, start+120)); }
}

/* Try with web search first; if the environment rejects the request shape,
   retry without tools so we can at least learn which variant this runtime allows. */
async function askClaude(prompt){
  try{
    const r = await askClaudeOnce(prompt, true);
    askClaude.mode = "web search";
    return r;
  }catch(e1){
    if(!/network:|HTTP 4|Invalid response/i.test(e1.message)) throw e1;
    try{
      const r = await askClaudeOnce(prompt + " Do not guess: if you are not certain, use null.", false);
      askClaude.mode = "no web search (limited)";
      return r;
    }catch(e2){
      throw new Error("with web search: [" + e1.message.slice(0,90) + "] without: [" + e2.message.slice(0,90) + "]");
    }
  }
}

/* ---------- Message builders ---------- */
async function buildFixturesMsg(matches, targetDay, niceDay, setStatus, label){
  label = label || "TODAY";
  buildFixturesMsg.tvError = null;
  const todays = matches
    .map(m => ({m, ko: kickoffUTC(m)}))
    .filter(x => x.ko && ukDateStr(x.ko) === targetDay)
    .sort((a,b) => a.ko - b.ko);
  if(todays.length === 0) return "\u26bd WORLD CUP 2026 \u2014 " + niceDay + "\n\nNo matches " + label.toLowerCase() + ". Rest those nerves!";

  /* UK TV channels: embedded schedule first, then cache, then Claude web search */
  const tv = await cacheGet("wc26-tv");
  todays.forEach(x => {
    const ch = EMBEDDED_CHANNELS[x.m.a + "|" + x.m.b] || EMBEDDED_CHANNELS[x.m.b + "|" + x.m.a];
    if(ch) tv[mKey(x.m)] = ch;
  });
  const known = todays.filter(x => FLAGS[x.m.a] && FLAGS[x.m.b]);
  const need = known.filter(x => !tv[mKey(x.m)]);
  if(need.length > 0){
    if(setStatus) setStatus("Checking UK TV channels\u2026");
    try{
      const found = await fetchChannelsViaClaude(need.map(x => x.m), niceDay);
      found.forEach(f => {
        const x = need.find(n => n.m.a === f.team1 && n.m.b === f.team2);
        if(x && f.channel) tv[mKey(x.m)] = f.channel;
      });
      await cacheSet("wc26-tv", tv);
    }catch(e){ buildFixturesMsg.tvError = e.message; }
  }

  const lines = todays.map(({m, ko}) => {
    const note = playerNote(m.a, m.b);
    const ch = tv[mKey(m)];
    const head = ukTime(ko) + " BST \u2014 " + teamLabel(m.a) + " v " + teamLabel(m.b) + (ch ? " \ud83d\udcfa " + ch : "");
    const v = venueLabel(m.g);
    const sub = [note, v ? "\ud83d\udccd " + v : ""].filter(Boolean).join(" \u00b7 ");
    return sub ? head + "\n" + sub : head;
  });
  return "\u26bd WORLD CUP 2026 \u2014 " + label + "'S MATCHES\n" + niceDay + " (all times UK)\n\n" + lines.join("\n\n");
}

async function buildResultsMsg(matches, live, targetDay, niceDay, setStatus){
  const played = matches.filter(m => {
    const ko = kickoffUTC(m);
    return ko && ukDateStr(ko) === targetDay;
  });
  if(played.length === 0) return "\u26bd WORLD CUP 2026 \u2014 " + niceDay + "\n\nNo matches were played yesterday.";

  let scores = {};
  played.forEach(m => { if(m.s) scores[m.a + "|" + m.b] = m.s; });

  const missing = played.filter(m => !scores[m.a + "|" + m.b]);
  if(missing.length > 0){
    setStatus("Looking up " + missing.length + " score(s) via Claude web search\u2026");
    try{
      const found = await fetchScoresViaClaude(missing, niceDay);
      found.forEach(f => { if(f.ft) scores[f.team1 + "|" + f.team2] = f.pens ? f.ft.concat(f.pens) : (f.aet ? f.ft.concat(["aet"]) : f.ft); });
    }catch(_){ /* fall through; unscored matches will say so */ }
  }

  const lines = played.map(m => {
    const s = scores[m.a + "|" + m.b];
    const note = playerNote(m.a, m.b);
    const head = s
      ? teamLabel(m.a) + " " + s[0] + "\u2013" + s[1] + " " + teamLabel(m.b) + scoreSuffix(s)
      : teamLabel(m.a) + " v " + teamLabel(m.b) + " \u2014 result not confirmed yet";
    return note ? head + "\n" + note : head;
  });
  return "\u26bd WORLD CUP 2026 \u2014 RESULTS\n" + niceDay + "\n\n" + lines.join("\n\n");
}

/* Score arrays: [a,b] = 90 mins; [a,b,"aet"] = extra time; [a,b,pa,pb] = pens decided */
const scoreSuffix = s => s.length === 4 ? " (" + s[2] + "\u2013" + s[3] + " pens)" : (s[2] === "aet" ? " aet" : "");

/* ---------- Leaderboard ---------- */
const mKey = m => m.a + "|" + m.b + "|" + m.d;

async function cacheGet(key){
  try{
    if(!window.storage) return {};
    const r = await window.storage.get(key);
    return r ? JSON.parse(r.value) : {};
  }catch(_){ return {}; }
}
async function cacheSet(key, map){
  try{ if(window.storage) await window.storage.set(key, JSON.stringify(map)); }catch(_){}
}

/* Gather scores for every match that has finished (kick-off + 2h45 before now). */
async function gatherAllScores(matches, setStatus){
  const now = Date.now();
  const finished = matches.filter(m => {
    const ko = kickoffUTC(m);
    return ko && (ko.getTime() + 165*60000) < now && FLAGS[m.a] && FLAGS[m.b];
  });
  const scores = await cacheGet("wc26-scores");
  finished.forEach(m => { if(m.s) scores[mKey(m)] = m.s; });

  let missing = finished.filter(m => !scores[mKey(m)]);
  if(missing.length > 0){
    for(let i = 0; i < missing.length; i += 12){
      const batch = missing.slice(i, i + 12);
      setStatus("Looking up scores via Claude web search\u2026 (" + Math.min(i+12, missing.length) + "/" + missing.length + ")");
      try{
        const day = batch.map(m => m.d).filter((v,j,a)=>a.indexOf(v)===j).join(", ");
        const found = await fetchScoresViaClaude(batch, day);
        found.forEach(f => {
          const m = batch.find(x => x.a === f.team1 && x.b === f.team2);
          if(m && f.ft) scores[mKey(m)] = f.pens ? f.ft.concat(f.pens) : (f.aet ? f.ft.concat(["aet"]) : f.ft);
        });
      }catch(_){ /* leave missing; they just won't count yet */ }
    }
    await cacheSet("wc26-scores", scores);
  }
  return {finished, scores};
}

function computeRows(table){
  return PLAYERS.map(([p]) => {
    const r = table[p];
    return {p, ...r, GD: r.GF - r.GA, Pts: r.W*3 + r.D};
  }).sort((x,y) => y.Pts - x.Pts || y.GD - x.GD || y.GF - x.GF || x.p.localeCompare(y.p));
}

function tallyTable(matchList, scores){
  const table = {};
  PLAYERS.forEach(([p]) => table[p] = {P:0, W:0, D:0, L:0, GF:0, GA:0});
  matchList.forEach(m => {
    const s = scores[mKey(m)];
    if(!s) return;
    const pens = s.length === 4 ? [s[2], s[3]] : null;
    [[m.a, s[0], s[1], pens ? pens[0]-pens[1] : 0], [m.b, s[1], s[0], pens ? pens[1]-pens[0] : 0]].forEach(([team, gf, ga, pdiff]) => {
      const p = TEAM_TO_PLAYER[team];
      if(!p) return;
      const r = table[p];
      r.P++; r.GF += gf; r.GA += ga;
      if(gf > ga) r.W++;
      else if(gf < ga) r.L++;
      else if(pens){ if(pdiff > 0) r.W++; else r.L++; }
      else r.D++;
    });
  });
  return table;
}

function buildLeaderboardMsg(finished, scores, niceDay){
  const table = {};
  PLAYERS.forEach(([p]) => table[p] = {P:0, W:0, D:0, L:0, GF:0, GA:0});
  let counted = 0, pending = 0;
  finished.forEach(m => {
    const s = scores[mKey(m)];
    if(!s){ pending++; return; }
    counted++;
    const pens = s.length === 4 ? [s[2], s[3]] : null;
    [[m.a, s[0], s[1], pens ? pens[0] - pens[1] : 0], [m.b, s[1], s[0], pens ? pens[1] - pens[0] : 0]].forEach(([team, gf, ga, pdiff]) => {
      const p = TEAM_TO_PLAYER[team];
      if(!p) return;
      const r = table[p];
      r.P++; r.GF += gf; r.GA += ga;
      if(gf > ga) r.W++;
      else if(gf < ga) r.L++;
      else if(pens){ if(pdiff > 0) r.W++; else r.L++; }
      else r.D++;
    });
  });
  if(counted === 0) return "\u26bd WORLD CUP 2026 \u2014 LEADERBOARD\n\nNo completed matches yet \u2014 check back after the first results!";

  const rows = computeRows(table);

  const medals = ["\ud83e\udd47","\ud83e\udd48","\ud83e\udd49"];
  let lines = [], pos = 0, prev = null;
  rows.forEach((r, i) => {
    const sig = r.Pts + "|" + r.GD + "|" + r.GF;
    if(sig !== prev){ pos = i + 1; prev = sig; }
    const badge = pos <= 3 ? medals[pos-1] + " " : "";
    const gd = (r.GD >= 0 ? "+" : "") + r.GD;
    lines.push(badge + pos + ". " + r.p + " \u2014 P" + r.P + " W" + r.W + " D" + r.D + " L" + r.L + " \u00b7 GD " + gd + " \u00b7 " + r.Pts + "pts");
  });
  let msg = "\u26bd WORLD CUP 2026 \u2014 LEADERBOARD\nAfter " + counted + " match" + (counted===1?"":"es") + ", " + niceDay + "\n\n" + lines.join("\n");
  if(pending > 0) msg += "\n\n(" + pending + " finished match" + (pending===1?"":"es") + " awaiting confirmed scores)";
  return msg;
}

async function askClaudeText(prompt){

    body: JSON.stringify({
      model: "claude-sonnet-4-20250514",

      messages: [{role:"user", content: prompt}]
    })
  });

  if(!resp.ok) throw new Error("HTTP " + resp.status);

const pick = arr => arr[Math.floor(Math.random() * arr.length)];

function localCommentary(results, scores, prevRows, currRows, todays){
  const L = [];
  L.push(pick([
    "\ud83c\udf99\ufe0f GOOD EVENING AND WELCOME, wherever in the world you are!",
    "\ud83c\udf99\ufe0f HELLO AND WELCOME to another unmissable day of this remarkable World Cup!",
    "\ud83c\udf99\ufe0f WELL. Take a breath, pour the tea \u2014 what a tournament this is turning into!"
  ]));
  L.push("");

  if(results.length === 0){
    L.push(pick([
      "Not a ball kicked yesterday \u2014 a chance for tired legs and frayed nerves to recover.",
      "A rest day yesterday, and frankly, after the football we've seen, we all needed one."
    ]));
  } else {
    results.forEach(m => {
      const sc = scores[mKey(m)];
      const p1 = TEAM_TO_PLAYER[m.a], p2 = TEAM_TO_PLAYER[m.b];
      if(!sc){
        L.push(m.a + " and " + m.b + " did battle, but word of the final score hasn't reached the gantry yet.");
        return;
      }
      const diff = sc[0] - sc[1];
      const line = teamLabel(m.a) + " " + sc[0] + "\u2013" + sc[1] + " " + teamLabel(m.b) + scoreSuffix(sc);
      let colour;
      if(sc.length === 4){
        const w = sc[2] > sc[3] ? [m.a, p1] : [m.b, p2];
        colour = pick(["Penalties! You simply could not write it \u2014 and it's " + w[1] + "'s " + w[0] + " holding their nerve from twelve yards.",
                       "Drama of the very highest order \u2014 " + w[0] + " win the shootout and " + w[1] + " breathes again!"]);
      } else if(diff === 0){
        colour = pick(["Honours even, and you'd say neither " + (p1||"") + " nor " + (p2||"") + " will sleep easy.",
                       "A point apiece \u2014 a proper game of two halves, that."]);
      } else {
        const wTeam = diff > 0 ? m.a : m.b, wPlayer = diff > 0 ? p1 : p2;
        const margin = Math.abs(diff);
        colour = margin === 1 ? pick([wTeam + " edge it by the odd goal \u2014 " + wPlayer + " punching the air in the group chat!",
                                       "Squeaky-bum time right to the end, but " + wTeam + " see it out for " + wPlayer + "."])
               : margin === 2 ? pick(["Comfortable in the end for " + wTeam + " \u2014 the boy " + wPlayer + " done good.",
                                       wTeam + " with daylight between the sides \u2014 " + wPlayer + " will take that all day long."])
               : pick(["AN ABSOLUTE DEMOLITION! " + wTeam + " run riot and " + wPlayer + " is dreaming of the trophy already.",
                       wTeam + " simply magnificent \u2014 they could have had six! " + wPlayer + " in dreamland."]);
      }
      L.push(line); L.push(colour); L.push("");
    });
  }

  /* Table talk */
  if(currRows[0].Pts > 0){
    const leader = currRows[0];
    L.push("AS FOR THE TABLE: make no mistake, " + leader.p + " sits atop the pile \u2014 " + leader.Pts + " points, goal difference " + (leader.GD>=0?"+":"") + leader.GD + ".");
    const prevPos = {}; prevRows.forEach((r,i) => prevPos[r.p] = i);
    let best = null;
    currRows.forEach((r,i) => {
      const up = prevPos[r.p] - i;
      if(up > 0 && (!best || up > best.up)) best = {p:r.p, up};
    });
    if(best) L.push("The big mover? " + best.p + ", up " + best.up + " place" + (best.up>1?"s":"") + " overnight \u2014 they'll tell their grandchildren about this.");
    const bottom = currRows[currRows.length-1];
    if(bottom.P > 0 && bottom.Pts === 0) L.push("And spare a thought for " + bottom.p + ". It's been a baptism of fire, no two ways about it.");
    L.push("");
  }

  /* Predictions */
  if(todays.length > 0){
    L.push(pick(["TO TONIGHT'S FARE, and my predictions \u2014 cut them out and keep them:",
                 "AND SO TO TODAY \u2014 the crystal ball says:"]));
    todays.forEach(({m, ko}) => {
      const p1 = TEAM_TO_PLAYER[m.a], p2 = TEAM_TO_PLAYER[m.b];
      const fav = Math.random() < 0.5 ? [m.a, p1] : [m.b, p2];
      L.push("\u2022 " + m.a + " v " + m.b + " (" + ukTime(ko) + "): " + pick([
        "I fancy " + fav[0] + " by the odd goal" + (fav[1] ? " \u2014 advantage " + fav[1] : "") + ".",
        "goalless draw written all over it. Write it down.",
        fav[0] + " to shade it on a night of high drama" + (m.g ? " in " + venueLabel(m.g) : "") + ".",
        "this one's got 2\u20132 and late, late drama stamped right through it."
      ]));
    });
  } else {
    L.push("No football today \u2014 use the time wisely. Speak to your families.");
  }
  L.push("");
  L.push(pick(["That's all from me. Football \u2014 it's a funny old game. See you tomorrow!",
               "Right, that's your lot from the gantry. Don't have nightmares about the 3am kick-offs!",
               "The World Cup waits for no one \u2014 until tomorrow, good night and good football!"]));
  return "\u26bd\ud83c\udf99\ufe0f THE COMMENTARY BOX\n\n" + L.join("\n");
}

async function buildCommentaryMsg(matches, setStatus){
  const now = new Date();
  const yest = new Date(now.getTime() - 24*3600*1000);
  const yDay = ukDateStr(yest), tDay = ukDateStr(now);
  const {finished, scores} = await gatherAllScores(matches, setStatus);
  const results = matches.filter(m => { const ko = kickoffUTC(m); return ko && ukDateStr(ko) === yDay; });
  const todays = matches.map(m => ({m, ko: kickoffUTC(m)}))
    .filter(x => x.ko && ukDateStr(x.ko) === tDay).sort((a,b) => a.ko - b.ko);
  const before = finished.filter(m => { const ko = kickoffUTC(m); return ukDateStr(ko) < yDay; });
  const prevRows = computeRows(tallyTable(before, scores));
  const currRows = computeRows(tallyTable(finished, scores));

  /* Prefer Claude-written commentary when the environment allows */
  setStatus("Warming up the commentary box\u2026");
  try{
    const data = {
      yesterdays_results: results.map(m => ({match: m.a + " v " + m.b, score: scores[mKey(m)] || "unknown",
        owners: [TEAM_TO_PLAYER[m.a], TEAM_TO_PLAYER[m.b]]})),
      table_top5: currRows.slice(0,5).map((r,i) => (i+1) + ". " + r.p + " " + r.Pts + "pts GD" + r.GD),
      todays_fixtures: todays.map(x => x.m.a + " v " + x.m.b + " at " + ukTime(x.ko) + " BST" + (x.m.g ? " in " + venueLabel(x.m.g) : ""))
    };
    return await askClaudeText("Write a WhatsApp message (under 200 words, plain text, no markdown) in the voice of a stereotypical traditional British football commentator: breathless, cliche-laden, warm. It is for a family World Cup sweepstake where each person owns teams. Cover: (1) yesterday's results with drama, crediting the family owners; (2) the state of the sweepstake table; (3) confident tongue-in-cheek predictions for today's fixtures. Data: " + JSON.stringify(data));
  }catch(_){
    return localCommentary(results, scores, prevRows, currRows, todays);
  }
}

/* ---------- UI wiring ---------- */
const statusEl = document.getElementById("status");
const chatEl = document.getElementById("chat");
const msgEl = document.getElementById("msg");
const btns = [document.getElementById("btnYesterday"), document.getElementById("btnToday"), document.getElementById("btnTomorrow"), document.getElementById("btnLeaderboard"), document.getElementById("btnCommentary")];
const setStatus = s => statusEl.textContent = s;

async function generate(kind){
  btns.forEach(b => b.disabled = true);
  setStatus("Loading match data\u2026");
  chatEl.classList.remove("show");
  try{
    const {matches, live} = await loadMatches();
    const now = new Date();
    let msg;
    if(kind === "yesterday"){
      const target = new Date(now.getTime() - 24*3600*1000);
      msg = await buildResultsMsg(matches, live, ukDateStr(target), ukNiceDate(target), setStatus);
    } else if(kind === "commentary"){
      msg = await buildCommentaryMsg(matches, setStatus);
    } else if(kind === "leaderboard"){
      const {finished, scores} = await gatherAllScores(matches, setStatus);
      msg = buildLeaderboardMsg(finished, scores, ukNiceDate(now));
    } else if(kind === "tomorrow"){
      const target = new Date(now.getTime() + 24*3600*1000);
      msg = await buildFixturesMsg(matches, ukDateStr(target), ukNiceDate(target), setStatus, "TOMORROW");
    } else {
      msg = await buildFixturesMsg(matches, ukDateStr(now), ukNiceDate(now), setStatus, "TODAY");
    }
    msgEl.textContent = msg;
    chatEl.classList.add("show");
    let note = "Ready \u2014 copy it into the family chat.";
    if((kind === "today" || kind === "tomorrow") && buildFixturesMsg.tvError){
      note += " TV channels unavailable \u2014 " + String(buildFixturesMsg.tvError).slice(0,220);
    } else if(askClaude.mode === "no web search (limited)"){
      note += " (This environment blocked web search \u2014 lookups ran on Claude's built-in knowledge, so some channels/scores may be missing.)";
    }
    setStatus(note);
  }catch(e){
    setStatus("Something went wrong (" + e.message + "). Try again in a moment.");
  }finally{
    btns.forEach(b => b.disabled = false);
  }
}

btns[0].addEventListener("click", () => generate("yesterday"));
btns[1].addEventListener("click", () => generate("today"));
btns[2].addEventListener("click", () => generate("tomorrow"));
btns[3].addEventListener("click", () => generate("leaderboard"));
btns[4].addEventListener("click", () => generate("commentary"));

document.getElementById("btnCopy").addEventListener("click", async () => {
  const text = msgEl.textContent;
  try{
    await navigator.clipboard.writeText(text);
  }catch(_){
    const ta = document.createElement("textarea");
    ta.value = text; document.body.appendChild(ta);
    ta.select(); document.execCommand("copy"); ta.remove();
  }
  setStatus("Copied \u2713 \u2014 paste it into WhatsApp.");
});

document.getElementById("rosterTable").innerHTML = PLAYERS.map(([p, ts]) =>
  "<tr><td>" + p + "</td><td>" + ts.map(teamLabel).join(" &nbsp;&middot;&nbsp; ") + "</td></tr>"
).join("");

document.querySelector(".tick").textContent =
  new Intl.DateTimeFormat("en-GB",{timeZone:"Europe/London",hour:"2-digit",minute:"2-digit"}).format(new Date()) + " \u2713\u2713";
</script>
