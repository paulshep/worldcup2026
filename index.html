<html lang="en-GB">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Family World Cup Sweepstake 2026</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Archivo+Black&family=Archivo:wght@400;600;700&display=swap');
  :root{
    --pitch:#0A3526; --pitch-line:#1C5A40; --cream:#FBF6EA; --ink:#16241D;
    --gold:#D9A93C; --bubble:#D9FDD3; --bubble-ink:#0B1F14; --muted:#6E7A72;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{
    font-family:'Archivo',system-ui,sans-serif;
    background:repeating-linear-gradient(90deg, transparent 0 88px, rgba(255,255,255,.035) 88px 176px),var(--pitch);
    color:var(--cream); min-height:100vh;
    display:flex; flex-direction:column; align-items:center;
    padding:28px 16px 48px;
  }
  header{text-align:center; margin-bottom:26px; max-width:560px}
  .crest{display:inline-block; border:2px solid var(--gold); border-radius:999px;
    padding:4px 14px; font-size:11px; letter-spacing:.22em; text-transform:uppercase;
    color:var(--gold); margin-bottom:14px;}
  h1{font-family:'Archivo Black',sans-serif; font-size:clamp(28px,7vw,44px);
    line-height:1.02; text-transform:uppercase;}
  h1 .y{color:var(--gold)}
  header p{margin-top:10px; font-size:14px; color:#BFD3C7}
  .card{background:var(--cream); color:var(--ink); width:100%; max-width:560px;
    border-radius:14px; box-shadow:0 14px 40px rgba(0,0,0,.35); padding:22px 20px 26px;}
  .btn-row{display:flex; gap:12px; flex-wrap:wrap}
  button.gen{flex:1 1 200px; font-family:'Archivo Black',sans-serif; font-size:15px;
    text-transform:uppercase; letter-spacing:.05em; padding:16px 12px; border-radius:10px;
    border:none; cursor:pointer; background:var(--pitch); color:var(--cream);
    transition:transform .08s ease, background .15s ease;}
  button.gen:hover{background:var(--pitch-line)}
  button.gen:active{transform:scale(.98)}
  button.gen:disabled{opacity:.55; cursor:wait}
  button.gen:focus-visible,.copy:focus-visible,.roster summary:focus-visible{outline:3px solid var(--gold); outline-offset:2px;}
  button.gen small{display:block; font-family:'Archivo',sans-serif; font-weight:600;
    font-size:11px; text-transform:none; letter-spacing:0; opacity:.75; margin-top:4px}
  .status{margin-top:16px; font-size:13px; color:var(--muted); min-height:18px}
  .chat{margin-top:14px; padding:18px 14px 8px; background:#E7DFD2; border-radius:10px; display:none;}
  .chat.show{display:block}
  .bubble{position:relative; background:var(--bubble); color:var(--bubble-ink);
    border-radius:10px; border-top-left-radius:2px; padding:12px 14px 10px;
    white-space:pre-wrap; font-size:14.5px; line-height:1.5;
    box-shadow:0 1px 1px rgba(0,0,0,.12); word-wrap:break-word;}
  .bubble .tick{display:block; text-align:right; font-size:11px; color:#5BA08B; margin-top:6px;}
  .copy{margin:12px auto 8px; display:block; font-family:'Archivo',sans-serif;
    font-weight:700; font-size:13px; padding:10px 22px; border-radius:999px;
    border:2px solid var(--pitch); background:transparent; color:var(--pitch);
    cursor:pointer; transition:background .15s ease, color .15s ease;}
  .copy:hover{background:var(--pitch); color:var(--cream)}
  .roster{margin-top:22px; border-top:2px dashed #D8CDB8; padding-top:14px}
  .roster summary{cursor:pointer; font-weight:700; font-size:13px; text-transform:uppercase;
    letter-spacing:.08em; color:var(--pitch); list-style:none;}
  .roster summary::before{content:'\25B8 '}
  .roster[open] summary::before{content:'\25BE '}
  .roster table{width:100%; margin-top:10px; border-collapse:collapse; font-size:13.5px}
  .roster td{padding:5px 4px; border-bottom:1px solid #EDE5D4}
  .roster td:first-child{font-weight:700; white-space:nowrap}
  footer{margin-top:22px; font-size:11px; color:#7FA290; text-align:center; max-width:560px}
  @media (prefers-reduced-motion: reduce){ *{transition:none !important} }
</style>
</head>
<body>

<header>
  <div class="crest">USA &middot; Mexico &middot; Canada 2026</div>
  <h1>Family <span class="y">Sweepstake</span><br>Message Maker</h1>
  <p>One tap, one message, straight to the family chat.</p>
</header>

<main class="card">
  <div class="btn-row">
    <button class="gen" id="btnYesterday">Yesterday's results<small>scores + who had each team</small></button>
    <button class="gen" id="btnToday">Today's matches<small>kick-offs in UK time</small></button>
    <button class="gen" id="btnTomorrow">Tomorrow's matches<small>plan ahead — UK times</small></button>
    <button class="gen" id="btnLeaderboard">Leaderboard<small>played, W-D-L, goal difference</small></button>
    <button class="gen" id="btnCommentary">Commentary<small>the beautiful game, in words</small></button>
    <button class="gen" id="btnData">Match data<small>what the feed has &amp; when</small></button>
  </div>
  <div class="status" id="status"></div>

  <div class="chat" id="chat">
    <div class="bubble"><span id="msg"></span><span class="tick">12:00 &#10003;&#10003;</span></div>
    <button class="copy" id="btnCopy">Copy message</button>
  </div>

  <details class="roster">
    <summary>The draw &mdash; 24 players, 48 teams</summary>
    <table id="rosterTable"></table>
  </details>
</main>

<footer>Full fixture list built in. Scores fetched live (direct or via Claude web search). Times in UK time (BST).</footer>

/* ---------- Date helpers (anchored to UK time) ---------- */
function kickoffUTC(m){
  if(!m.d) return null;
  const [y,mo,d] = m.d.split("-").map(Number);
  if(!m.t) return new Date(Date.UTC(y, mo-1, d, 12, 0));
  const t = m.t.match(/(\d{1,2}):(\d{2})/);
  const off = m.t.match(/UTC([+-])(\d{1,2})(?::(\d{2}))?/);
  let h = t ? +t[1] : 12, min = t ? +t[2] : 0, offMin = 0;
  if(off){ offMin = (+off[2])*60 + (off[3]?+off[3]:0); if(off[1]==="-") offMin = -offMin; }
  return new Date(Date.UTC(y, mo-1, d, h, min) - offMin*60000);
}
const ukDateStr = d => new Intl.DateTimeFormat("en-CA",{timeZone:"Europe/London",year:"numeric",month:"2-digit",day:"2-digit"}).format(d);
const ukTime = d => new Intl.DateTimeFormat("en-GB",{timeZone:"Europe/London",hour:"numeric",minute:"2-digit",hour12:true}).format(d).replace(/\s/g,"");
const ukNiceDate = d => new Intl.DateTimeFormat("en-GB",{timeZone:"Europe/London",weekday:"long",day:"numeric",month:"long"}).format(d);

/* Rolling-window helpers. We group by a 24h window from "now" rather than by UK
   calendar date, so a gameday whose late US kick-offs spill into the early hours of
   the next UK day stays together instead of being split across two dates. */
const HOUR = 3600*1000, DAY = 24*HOUR;
function inWindow(ko, startMs, endMs){ return ko && ko.getTime() >= startMs && ko.getTime() < endMs; }
const ukShort = d => new Intl.DateTimeFormat("en-GB",{timeZone:"Europe/London",weekday:"long",day:"numeric",month:"long"}).format(d);
/* Label a set of in-window matches by the UK date(s) they actually span. */
function windowLabel(kos){
  if(!kos.length) return "";
  const days = [...new Set(kos.map(k => ukDateStr(k)))].sort();
  if(days.length === 1) return ukShort(new Date(days[0] + "T12:00:00Z"));
  const first = ukShort(new Date(days[0] + "T12:00:00Z"));
  const last = ukShort(new Date(days[days.length-1] + "T12:00:00Z"));
  // trim the month off the first if both share it, e.g. "Wednesday 10 – Thursday 11 June"
  return first + " – " + last;
}

/* ---------- Formatting ---------- */
const teamLabel = n => (FLAGS[n] ? FLAGS[n] + " " + n : n);

/* Append each country's flag immediately after every mention of its name (for commentary).
   Longest names first so "South Korea" is handled before any short substring; the negative
   lookahead prevents adding a second flag where one is already present. */
const FLAG_NAMES = Object.keys(FLAGS).sort((a,b) => b.length - a.length);
function withFlags(text){
  for(const name of FLAG_NAMES){
    const flag = FLAGS[name];
    const esc = name.replace(/[.*+?^${}()|[\]\\]/g, "\\$&");
    text = text.replace(new RegExp(esc + "(?!\\uFE0F|\\s*" + flag + ")", "g"), name + " " + flag);
  }
  return text;
}
const venueLabel = g => g ? g.replace(/\s*\(.*\)\s*$/, "") : "";
function playerNote(t1, t2){
  const p1 = TEAM_TO_PLAYER[t1], p2 = TEAM_TO_PLAYER[t2];
  if(p1 && p2) return p1 === p2 ? "(both " + p1 + "!)" : "(" + p1 + " v " + p2 + ")";
  if(p1) return "(" + p1 + "'s " + t1 + ")";
  if(p2) return "(" + p2 + "'s " + t2 + ")";
  return "";
}

/* ---------- Data: live fetch -> embedded fallback ---------- */
async function loadMatches(){
  try{
    const ctl = new AbortController();
    const timer = setTimeout(() => ctl.abort(), 6000);
    const r = await fetch(DATA_URL, {cache:"no-store", signal:ctl.signal});
    clearTimeout(timer);
    if(!r.ok) throw new Error("HTTP " + r.status);
    const j = await r.json();
    const norm = (j.matches || []).map(m => ({
      d: m.date, t: m.time,
      a: typeof m.team1 === "object" ? m.team1.name : m.team1,
      b: typeof m.team2 === "object" ? m.team2.name : m.team2,
      s: (function(sc){
        if(!sc || !(sc.ft || sc.et)) return undefined;
        let v = (sc.et || sc.ft).slice();
        if(sc.ps) v = v.concat(sc.ps);
        else if(sc.et) v.push("aet");
        return v;
      })(m.score),
      g: m.ground
    }));
    await overlayLive(norm);
    return {matches: norm, live: true};
  }catch(_){
    const base = EMBEDDED_MATCHES.map(m => ({...m}));
    await overlayLive(base);
    return {matches: base, live: false};
  }
}

/* Scores published by our own GitHub Action (api-football-backed). Same-origin on the
   hosted site, keyless. This is the most reliable source, so it is applied first. */
async function fetchPublishedScores(){
  const r = await fetch("scores.json", {cache:"no-store"});
  if(!r.ok) throw new Error("scores.json " + r.status);
  const j = await r.json();
  return j.scores || {};
}
async function overlayLive(matches){
  try{
    const pub = await fetchPublishedScores();
    matches.forEach(m => { const k = m.a + "|" + m.b; if(pub[k]) m.s = pub[k]; });
  }catch(_){ /* not hosted, or file absent — fall through */ }
  try{
    const live = await fetchLiveScores();
    matches.forEach(m => { const k = m.a + "|" + m.b; if(live[k] && !m.s) m.s = live[k]; });
  }catch(_){ /* keep base scores */ }
}

/* ---------- Shared Claude + web-search JSON helper ---------- */
async function askClaudeOnce(prompt, useTools){
  const body = {
    model: "claude-sonnet-4-20250514",
    max_tokens: 1000,
    messages: [{role:"user", content: prompt}]
  };
  if(useTools) body.tools = [{type:"web_search_20250305", name:"web_search"}];
  let resp;
  try{
    resp = await fetch("https://api.anthropic.com/v1/messages", {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify(body)
    });
  }catch(e){ throw new Error("network: " + e.message); }
  const raw = await resp.text();
  if(!resp.ok) throw new Error("HTTP " + resp.status + ": " + raw.slice(0,160));
  let data;
  try{ data = JSON.parse(raw); }catch(_){ throw new Error("non-JSON reply: " + raw.slice(0,160)); }
  if(data.type === "error" || data.error) throw new Error("API error: " + JSON.stringify(data.error || data).slice(0,160));
  const text = (data.content || []).filter(c => c.type === "text").map(c => c.text).join("\n");
  const clean = text.replace(/```json|```/g, "").trim();
  const start = clean.indexOf("["), end = clean.lastIndexOf("]");
  if(start === -1 || end === -1) throw new Error("no JSON array in reply: " + clean.slice(0,120));
  try{ return JSON.parse(clean.slice(start, end + 1)); }
  catch(e){ throw new Error("bad JSON in reply: " + clean.slice(start, start+120)); }
}

/* Try with web search first; if the environment rejects the request shape,
   retry without tools so we can at least learn which variant this runtime allows. */
async function askClaude(prompt){
  try{
    const r = await askClaudeOnce(prompt, true);
    askClaude.mode = "web search";
    return r;
  }catch(e1){
    if(!/network:|HTTP 4|Invalid response/i.test(e1.message)) throw e1;
    try{
      const r = await askClaudeOnce(prompt + " Do not guess: if you are not certain, use null.", false);
      askClaude.mode = "no web search (limited)";
      return r;
    }catch(e2){
      throw new Error("with web search: [" + e1.message.slice(0,90) + "] without: [" + e2.message.slice(0,90) + "]");
    }
  }
}

/* ---------- Message builders ---------- */
async function buildFixturesMsg(matches, startMs, endMs, setStatus, label){
  label = label || "TODAY";
  buildFixturesMsg.tvError = null;
  const todays = matches
    .map(m => ({m, ko: kickoffUTC(m)}))
    .filter(x => inWindow(x.ko, startMs, endMs))
    .sort((a,b) => a.ko - b.ko);
  const niceDay = windowLabel(todays.map(x => x.ko)) || "the next 24 hours";
  if(todays.length === 0) return "\u26bd WORLD CUP 2026 \u2014 " + (label === "TOMORROW" ? "TOMORROW" : "TODAY") + "\n\nNo matches in the " + (label === "TOMORROW" ? "following" : "next") + " 24 hours. Rest those nerves!";

  /* UK TV channels: embedded schedule first, then cache, then Claude web search */
  const tv = await cacheGet("wc26-tv");
  todays.forEach(x => {
    const ch = EMBEDDED_CHANNELS[x.m.a + "|" + x.m.b] || EMBEDDED_CHANNELS[x.m.b + "|" + x.m.a];
    if(ch) tv[mKey(x.m)] = ch;
  });
  const known = todays.filter(x => FLAGS[x.m.a] && FLAGS[x.m.b]);
  const need = known.filter(x => !tv[mKey(x.m)]);
  if(need.length > 0){
    if(setStatus) setStatus("Checking UK TV channels\u2026");
    try{
      const found = await fetchChannelsViaClaude(need.map(x => x.m), niceDay);
      found.forEach(f => {
        const x = need.find(n => n.m.a === f.team1 && n.m.b === f.team2);
        if(x && f.channel) tv[mKey(x.m)] = f.channel;
      });
      await cacheSet("wc26-tv", tv);
    }catch(e){ buildFixturesMsg.tvError = e.message; }
  }

  const lines = todays.map(({m, ko}) => {
    const note = playerNote(m.a, m.b);
    const ch = tv[mKey(m)];
    const head = ukTime(ko) + " BST \u2014 " + teamLabel(m.a) + " v " + teamLabel(m.b) + (ch ? " \ud83d\udcfa " + ch : "");
    const v = venueLabel(m.g);
    const sub = [note, v ? "\ud83d\udccd " + v : ""].filter(Boolean).join(" \u00b7 ");
    return sub ? head + "\n" + sub : head;
  });
  return "\u26bd WORLD CUP 2026 \u2014 " + label + "'S MATCHES\n" + niceDay + " (all times UK)\n\n" + lines.join("\n\n");
}

async function buildResultsMsg(matches, live, startMs, endMs, setStatus){
  const played = matches.filter(m => inWindow(kickoffUTC(m), startMs, endMs));
  const niceDay = windowLabel(played.map(m => kickoffUTC(m))) || "the last 24 hours";
  if(played.length === 0) return "\u26bd WORLD CUP 2026 \u2014 RESULTS\n\nNo matches in the last 24 hours.";

  let scores = {};
  played.forEach(m => { if(m.s) scores[m.a + "|" + m.b] = m.s; });

  const missing = played.filter(m => !scores[m.a + "|" + m.b]);
  if(missing.length > 0){
    setStatus("Looking up " + missing.length + " score(s) via Claude web search\u2026");
    try{
      const found = await fetchScoresViaClaude(missing, niceDay);
      found.forEach(f => { if(f.ft) scores[f.team1 + "|" + f.team2] = f.pens ? f.ft.concat(f.pens) : (f.aet ? f.ft.concat(["aet"]) : f.ft); });
    }catch(_){ /* fall through; unscored matches will say so */ }
  }

  const lines = played.map(m => {
    const s = scores[m.a + "|" + m.b];
    const note = playerNote(m.a, m.b);
    const head = s
      ? teamLabel(m.a) + " " + s[0] + "\u2013" + s[1] + " " + teamLabel(m.b) + scoreSuffix(s)
      : teamLabel(m.a) + " v " + teamLabel(m.b) + " \u2014 result not confirmed yet";
    return note ? head + "\n" + note : head;
  });
  return "\u26bd WORLD CUP 2026 \u2014 RESULTS\n" + niceDay + "\n\n" + lines.join("\n\n");
}

/* Score arrays: [a,b] = 90 mins; [a,b,"aet"] = extra time; [a,b,pa,pb] = pens decided */
const scoreSuffix = s => s.length === 4 ? " (" + s[2] + "\u2013" + s[3] + " pens)" : (s[2] === "aet" ? " aet" : "");

/* ---------- Leaderboard ---------- */
const mKey = m => m.a + "|" + m.b + "|" + m.d;

async function cacheGet(key){
  try{
    if(!window.storage) return {};
    const r = await window.storage.get(key);
    return r ? JSON.parse(r.value) : {};
  }catch(_){ return {}; }
}
async function cacheSet(key, map){
  try{ if(window.storage) await window.storage.set(key, JSON.stringify(map)); }catch(_){}
}

/* Gather scores for every match that has finished (kick-off + 2h45 before now). */
async function gatherAllScores(matches, setStatus){
  const now = Date.now();
  const finished = matches.filter(m => {
    const ko = kickoffUTC(m);
    return ko && (ko.getTime() + 165*60000) < now && FLAGS[m.a] && FLAGS[m.b];
  });

  // Authoritative source of truth: the published scores.json (football-data.org-backed, hourly).
  // overlayLive already applied it to m.s; we also re-fetch here so the commentary always matches
  // the leaderboard even if the earlier overlay missed, mapping undated scores.json keys to our dated keys.
  let pub = {};
  try{ pub = await fetchPublishedScores(); }catch(_){ pub = {}; }
  const scores = {};
  finished.forEach(m => {
    const undated = m.a + "|" + m.b;
    if(m.s) scores[mKey(m)] = m.s;                       // scores.json + live API (via overlayLive)
    else if(pub[undated]) scores[mKey(m)] = pub[undated]; // fresh scores.json fetch
  });
  // Only if we have nothing at all (published file unreachable) fall back to last-known cache.
  if(Object.keys(scores).length === 0){
    try{ Object.assign(scores, await cacheGet("wc26-scores-v2")); }catch(_){}
  }

  // Last resort: web-search ONLY for finished matches still missing a score.
  let missing = finished.filter(m => !scores[mKey(m)]);
  if(missing.length > 0){
    for(let i = 0; i < missing.length; i += 12){
      const batch = missing.slice(i, i + 12);
      setStatus("Looking up the last few scores\u2026 (" + Math.min(i+12, missing.length) + "/" + missing.length + ")");
      try{
        const day = batch.map(m => m.d).filter((v,j,a)=>a.indexOf(v)===j).join(", ");
        const found = await fetchScoresViaClaude(batch, day);
        found.forEach(f => {
          const m = batch.find(x => x.a === f.team1 && x.b === f.team2);
          if(m && f.ft) scores[mKey(m)] = f.pens ? f.ft.concat(f.pens) : (f.aet ? f.ft.concat(["aet"]) : f.ft);
        });
      }catch(_){ /* leave missing; they just won't count yet */ }
    }
  }
  // Cache purely as an offline fallback for next time \u2014 never the authoritative base.
  try{ await cacheSet("wc26-scores-v2", scores); }catch(_){}
  return {finished, scores};
}

function computeRows(table){
  return PLAYERS.map(([p]) => {
    const r = table[p];
    return {p, ...r, GD: r.GF - r.GA, Pts: r.W*3 + r.D};
  }).sort((x,y) => y.Pts - x.Pts || y.GD - x.GD || y.GF - x.GF || x.p.localeCompare(y.p));
}

function tallyTable(matchList, scores){
  const table = {};
  PLAYERS.forEach(([p]) => table[p] = {P:0, W:0, D:0, L:0, GF:0, GA:0});
  matchList.forEach(m => {
    const s = scores[mKey(m)];
    if(!s) return;
    const pens = s.length === 4 ? [s[2], s[3]] : null;
    [[m.a, s[0], s[1], pens ? pens[0]-pens[1] : 0], [m.b, s[1], s[0], pens ? pens[1]-pens[0] : 0]].forEach(([team, gf, ga, pdiff]) => {
      const p = TEAM_TO_PLAYER[team];
      if(!p) return;
      const r = table[p];
      r.P++; r.GF += gf; r.GA += ga;
      if(gf > ga) r.W++;
      else if(gf < ga) r.L++;
      else if(pens){ if(pdiff > 0) r.W++; else r.L++; }
      else r.D++;
    });
  });
  return table;
}

function buildLeaderboardMsg(finished, scores, niceDay){
  const table = {};
  PLAYERS.forEach(([p]) => table[p] = {P:0, W:0, D:0, L:0, GF:0, GA:0});
  let counted = 0, pending = 0;
  finished.forEach(m => {
    const s = scores[mKey(m)];
    if(!s){ pending++; return; }
    counted++;
    const pens = s.length === 4 ? [s[2], s[3]] : null;
    [[m.a, s[0], s[1], pens ? pens[0] - pens[1] : 0], [m.b, s[1], s[0], pens ? pens[1] - pens[0] : 0]].forEach(([team, gf, ga, pdiff]) => {
      const p = TEAM_TO_PLAYER[team];
      if(!p) return;
      const r = table[p];
      r.P++; r.GF += gf; r.GA += ga;
      if(gf > ga) r.W++;
      else if(gf < ga) r.L++;
      else if(pens){ if(pdiff > 0) r.W++; else r.L++; }
      else r.D++;
    });
  });
  if(counted === 0) return "\u26bd WORLD CUP 2026 \u2014 LEADERBOARD\n\nNo completed matches yet \u2014 check back after the first results!";

  const rows = computeRows(table);

  const medals = ["\ud83e\udd47","\ud83e\udd48","\ud83e\udd49"];
  let lines = [], pos = 0, prev = null;
  rows.forEach((r, i) => {
    const sig = r.Pts + "|" + r.GD + "|" + r.GF;
    if(sig !== prev){ pos = i + 1; prev = sig; }
    const badge = pos <= 3 ? medals[pos-1] + " " : "";
    const gd = (r.GD >= 0 ? "+" : "") + r.GD;
    lines.push(badge + pos + ". " + r.p + " \u2014 P" + r.P + " W" + r.W + " D" + r.D + " L" + r.L + " \u00b7 GD " + gd + " \u00b7 " + r.Pts + "pts");
  });
  let msg = "\u26bd WORLD CUP 2026 \u2014 LEADERBOARD\nAfter " + counted + " match" + (counted===1?"":"es") + ", " + niceDay + "\n\n" + lines.join("\n");
  if(pending > 0) msg += "\n\n(" + pending + " finished match" + (pending===1?"":"es") + " awaiting confirmed scores)";
  return msg;
}

async function askClaudeText(prompt){

    })

const pick = arr => arr[Math.floor(Math.random() * arr.length)];

/* Anti-repetition picker: within one message, never reuses a template from a given
   category until that category's pool is exhausted, then reshuffles. */
function makePicker(){
  const used = {};
  return (cat, arr) => {
    used[cat] = used[cat] || new Set();
    let avail = arr.map((_, i) => i).filter(i => !used[cat].has(i));
    if(!avail.length){ used[cat].clear(); avail = arr.map((_, i) => i); }
    const i = avail[Math.floor(Math.random() * avail.length)];
    used[cat].add(i);
    return arr[i];
  };
}
/* Fill {TOKEN} placeholders. */
const fill = (tpl, v) => tpl.replace(/\{(\w+)\}/g, (_, k) => (v[k] !== undefined && v[k] !== null) ? v[k] : "");
const ord = n => n + (n%10==1&&n%100!=11?"st":n%10==2&&n%100!=12?"nd":n%10==3&&n%100!=13?"rd":"th");
const aAn = w => (/^[AEIOUaeiou]/.test(w) ? "an " : "a ") + w;

function localCommentary(results, scores, prevRows, currRows, todays, knockout){
  const P = makePicker();
  const L = [];

  const ukHour = parseInt(new Intl.DateTimeFormat("en-GB",{timeZone:"Europe/London",hour:"numeric",hour12:false}).format(new Date()), 10);
  const greeting = ukHour < 12 ? "GOOD MORNING" : (ukHour < 18 ? "GOOD AFTERNOON" : "GOOD EVENING");
  L.push(P("open", [
    "\ud83c\udf99\ufe0f " + greeting + " AND WELCOME, wherever in the world you find yourself!",
    "\ud83c\udf99\ufe0f HELLO AND WELCOME back to the gantry for another helping of this glorious tournament!",
    "\ud83c\udf99\ufe0f WELL. Pour the tea, dust off the wallchart \u2014 the World Cup waits for no one!",
    "\ud83c\udf99\ufe0f GOODNESS, what a day of football. Welcome, one and all!",
    "\ud83c\udf99\ufe0f A very good day to you \u2014 and what a time to be a football family!",
    "\ud83c\udf99\ufe0f Strap yourselves in. The greatest show on earth rolls on!"
  ]));
  L.push("");

  /* ---------- Results recap ---------- */
  const scored = results.map(m => ({m, sc: scores[mKey(m)]})).filter(x => x.sc);
  if(results.length === 0){
    L.push(P("rest", [
      "Not a ball kicked in the last day \u2014 a breather for tired legs and frayed nerves.",
      "A quiet one, no fixtures to report. Savour the calm; it won't last.",
      "No football to recap \u2014 which means no one lost ground. Every cloud!"
    ]));
    L.push("");
  } else {
    // Day talking point from the actual numbers
    let big = null, fest = null;
    scored.forEach(({m, sc}) => {
      const margin = Math.abs(sc[0]-sc[1]), total = sc[0]+sc[1];
      if(!big || margin > big.margin) big = {m, sc, margin};
      if(!fest || total > fest.total) fest = {m, sc, total};
    });
    if(big && big.margin >= 3){
      const wTeam = big.sc[0] > big.sc[1] ? big.m.a : big.m.b;
      L.push(fill(P("point", [
        "Rout of the day belonged to {T} \u2014 emphatic stuff.",
        "If you missed {T}, you missed the thrashing of the day.",
        "{T} turned theirs into a procession. Ruthless."
      ]), {T: wTeam}));
      L.push("");
    } else if(fest && fest.total >= 5){
      L.push(fill(P("point", [
        "Goals galore in {A} v {B} \u2014 the neutrals' favourite of the day.",
        "{A} v {B} had everything. Defences? Optional, apparently."
      ]), {A: fest.m.a, B: fest.m.b}));
      L.push("");
    }

    scored.forEach(({m, sc}) => {
      const p1 = TEAM_TO_PLAYER[m.a], p2 = TEAM_TO_PLAYER[m.b];
      const line = m.a + " " + sc[0] + "\u2013" + sc[1] + " " + m.b + scoreSuffix(sc);
      const diff = sc[0] - sc[1];
      let colour;
      if(knockout && sc.length === 4){            // penalty shootout (knockouts only)
        const w = sc[2] > sc[3] ? [m.a, p1] : [m.b, p2];
        colour = fill(P("pens", [
          "Penalties! You could not write it \u2014 {T} hold their nerve and {PL} can breathe again.",
          "Drama from twelve yards, and it's {T} through. Spare a thought for the other lot.",
          "A shootout for the ages \u2014 {T} survive it, {PL} living every kick."
        ]), {T: w[0], PL: w[1] || "the family"});
      } else if(knockout && sc[2] === "aet"){      // extra-time winner (knockouts only)
        const w = diff > 0 ? [m.a, p1] : [m.b, p2];
        colour = fill(P("aet", [
          "Settled in extra time \u2014 {T} dig deep, {PL} aging a year in the process.",
          "It took 120 minutes, but {T} found a way. {PL} exhausted just watching."
        ]), {T: w[0], PL: w[1] || "the family"});
      } else if(diff === 0){
        const both = (p1 && p2) ? (p1 + " and " + p2) : (p1 || p2 || "both sides");
        colour = (sc[0] === 0)
          ? fill(P("draw0", [
              "Goalless, and goalless it stayed. A point each for {B2}, and not much for the scrapbook.",
              "Nil-nil. {B2} share the spoils; the chances did not.",
              "A stalemate \u2014 {B2} cancel each other out. Tidy at the back, blunt up top."
            ]), {B2: both})
          : fill(P("drawN", [
              "Honours even, and end to end with it. {B2} both leave with something.",
              "A proper ding-dong, finishing level \u2014 {B2} split the difference.",
              "Shared, and thoroughly entertaining. {B2} will each take the point."
            ]), {B2: both});
      } else {
        const wTeam = diff > 0 ? m.a : m.b, wPlayer = diff > 0 ? p1 : p2;
        const lPlayer = diff > 0 ? p2 : p1;
        const margin = Math.abs(diff), conceded = Math.min(sc[0], sc[1]) > 0;
        const v = {T: wTeam, PL: wPlayer || "the family", LP: lPlayer || "the other camp"};
        colour = margin === 1
          ? (conceded
              ? fill(P("win1c", [
                  "The odd goal in a thriller \u2014 {T} find a way, and {PL} will take it gladly.",
                  "Nothing in it to the last kick, but {T} edge home. Big exhale from {PL}.",
                  "Heart-in-mouth stuff \u2014 {T} over the line, {PL} doing their best to look calm."
                ]), v)
              : fill(P("win1cs", [
                  "A clean sheet and the odd goal \u2014 {T} grind it out for {PL}.",
                  "One goal, none conceded \u2014 unfussy and effective from {T}. {PL} purring."
                ]), v))
          : margin === 2
          ? fill(P("win2", [
              "A bit to spare for {T} \u2014 {PL} settling in nicely.",
              "Comfortable in the end; {T} had the measure of it. {PL} will have enjoyed that.",
              "Two clear goals for {T} \u2014 {PL} off and running, {LP} with work to do."
            ]), v)
          : fill(P("win3", [
              "Goodness me \u2014 {T} ran riot! A statement, and {PL} is dreaming already.",
              "{T} were irresistible. Party hats for {PL}; commiserations to {LP}.",
              "A real demolition from {T} \u2014 they could have had more. {PL} in dreamland."
            ]), v);
      }
      L.push(line);
      L.push(colour);
      L.push("");
    });
    // any results still awaiting a confirmed score
    results.filter(m => !scores[mKey(m)]).forEach(m => {
      L.push(fill(P("nosc", [
        "{A} v {B} was played, but the final score hasn't reached the gantry yet.",
        "Word from {A} v {B} is still coming through \u2014 we'll have it for you soon."
      ]), {A: m.a, B: m.b}));
      L.push("");
    });
  }

  /* ---------- Table talk ---------- */
  if(currRows[0] && currRows[0].Pts > 0){
    const leader = currRows[0];
    L.push(fill(P("lead", [
      "AT THE TOP: {p} sets the pace \u2014 {pts} points, goal difference {gd}.",
      "Leading the family this morning, it's {p}: {pts} points and a {gd} goal difference. Take a bow.",
      "{p} sits proudly on top \u2014 {pts} points to show for it. Long may it last (says everyone else, through gritted teeth)."
    ]), {p: leader.p, pts: leader.Pts, gd: (leader.GD>=0?"+":"")+leader.GD}));

    const prevPos = {}; prevRows.forEach((r,i) => prevPos[r.p] = i);
    let best = null;
    if(prevRows.some(r => r.Pts > 0)){          // skip movers if nobody had points before (just alphabetical noise)
      currRows.forEach((r,i) => {
        if(!(r.p in prevPos)) return;
        const up = prevPos[r.p] - i;
        if(up > 0 && (!best || up > best.up)) best = {p:r.p, up};
      });
    }
    if(best){
      L.push(fill(P("mover", [
        "Biggest climber? {p}, up {n} {pl} \u2014 get them a cup of tea, they've earned it.",
        "{p} is the mover of the day, leaping {n} {pl}. Onwards and upwards!",
        "Quietly surging: {p}, up {n} {pl}. Don't tell them, they'll get cocky."
      ]), {p: best.p, n: best.up, pl: best.up>1?"places":"place"}));
    }
    const bottom = currRows[currRows.length-1];
    if(bottom.P > 0 && bottom.Pts === 0){
      L.push(fill(P("bottom", [
        "And a kind word for {p}, propping up the table \u2014 early days, chin up.",
        "Someone has to be bottom, and today it's {p}. The only way is up, eh?",
        "{p} will want to forget that one. Plenty of football left, though."
      ]), {p: bottom.p}));
    }
    L.push("");
  }

  /* ---------- Predictions: sweepstake duels with table stakes ---------- */
  const posOf = {}; currRows.forEach((r, i) => posOf[r.p] = i + 1);
  const climbWithWin = p => {
    const me = currRows.find(r => r.p === p);
    const hyp = me.Pts + 3, hypGD = me.GD + 1;
    let newPos = 1;
    currRows.forEach(r => {
      if(r.p === p) return;
      if(r.Pts > hyp || (r.Pts === hyp && (r.GD > hypGD || (r.GD === hypGD && r.GF > me.GF + 1)))) newPos++;
    });
    return Math.min(newPos, posOf[p]);
  };
  if(todays.length > 0){
    L.push(P("predOpen", [
      "TO TODAY'S FIXTURES \u2014 and a few wholly unscientific predictions:",
      "AND SO TO TODAY. The family rivalries renew:",
      "RIGHT, today's grudge matches \u2014 keep it friendly in the group chat:",
      "TO THE CRYSTAL BALL, then. Squint and you might see the future:"
    ]));
    todays.forEach(({m, ko}) => {
      const p1 = TEAM_TO_PLAYER[m.a], p2 = TEAM_TO_PLAYER[m.b];
      const head = "\u2022 " + m.a + " v " + m.b + " (" + ukTime(ko) + "): ";
      if(p1 && p2 && p1 === p2){
        L.push(head + fill(P("both", [
          "{p} owns BOTH sides \u2014 can't lose, can't win, utterly zen. We should all live like {p} today.",
          "A no-lose, no-win afternoon for {p}, who has both teams. Pure serenity."
        ]), {p: p1}));
        return;
      }
      if(!p1 || !p2){
        L.push(head + P("placeholder", [
          "knockout territory \u2014 the table holds its breath.",
          "a slot still to be filled \u2014 names to follow once the groups settle."
        ]));
        return;
      }
      const duel = p1 + " (" + ord(posOf[p1]) + ") meets " + p2 + " (" + ord(posOf[p2]) + ") in the family stakes. ";
      const c1 = climbWithWin(p1), c2 = climbWithWin(p2);
      const stakes = [];
      if(c1 < posOf[p1]) stakes.push(aAn(m.a) + " win lifts " + p1 + " to " + ord(c1));
      if(c2 < posOf[p2]) stakes.push("three points sends " + p2 + " up to " + ord(c2));
      // if a top-3 player can't climb, frame it as defending their perch
      if(!stakes.length){
        const top = posOf[p1] <= posOf[p2] ? p1 : p2;
        if(posOf[top] <= 3) stakes.push(top + " just wants to protect " + ord(posOf[top]) + " place");
      }
      const stakeLine = stakes.length ? (stakes.join(", while ") + ". ").replace(/^./, c => c.toUpperCase()) : "";
      const kicker = knockout
        ? P("kickKO", [
            "No draws here \u2014 someone's tournament ends tonight.",
            "Win or go home. Hold onto something.",
            "Sudden-death stuff. May the bravest side prevail."
          ])
        : P("kick", [
            "My heart says both; my head says enjoy the ride.",
            "Smells like the odd goal and a smug breakfast for somebody.",
            "Be curious in the group chat, not cruel.",
            "Pressure's for tyres. Go and enjoy yourselves, you two.",
            "Winner takes the bragging rights; loser builds character.",
            "A score draw wouldn't shock me \u2014 and would suit nobody.",
            "Form goes out the window on days like this.",
            "Whatever happens, hug it out afterwards."
          ]);
      L.push(head + duel + stakeLine + kicker);
    });
  } else {
    L.push(P("noFix", [
      "No football today \u2014 a rest day. Call your mother. Tell her about the goal difference.",
      "Nothing on today. A chance to study the table and plot quietly.",
      "A blank day in the schedule \u2014 use it wisely, recharge the vocal cords."
    ]));
  }
  L.push("");
  L.push(P("sign", [
    "That's your lot from the gantry. It's a funny old game \u2014 see you tomorrow!",
    "Until next time: mind those late kick-offs!",
    "The World Cup rolls on. Until next time, and good football!",
    "Back tomorrow \u2014 same gantry, same questionable predictions.",
    "From all of us up here: enjoy every minute. It comes around but once every four years."
  ]));
  return "\u26bd\ud83c\udf99\ufe0f THE COMMENTARY BOX\n\n" + L.join("\n");
}

async function buildCommentaryMsg(matches, setStatus){
  const now = new Date();
  const N = now.getTime();
  const {finished, scores} = await gatherAllScores(matches, setStatus);
  const results = matches.filter(m => {
    const ko = kickoffUTC(m);
    if(!ko || !inWindow(ko, N - DAY, N)) return false;
    // include if we already have a score (definitely done), or enough time has passed to be finished
    return !!scores[mKey(m)] || (ko.getTime() + 165*60000) < N;
  });
  const todays = matches.map(m => ({m, ko: kickoffUTC(m)}))
    .filter(x => inWindow(x.ko, N, N + DAY)).sort((a,b) => a.ko - b.ko);       // next 24h
  const before = finished.filter(m => { const ko = kickoffUTC(m); return ko && ko.getTime() < (N - DAY); });
  const prevRows = computeRows(tallyTable(before, scores));
  const currRows = computeRows(tallyTable(finished, scores));

  // Knockouts begin 28 June 2026; before that there is no extra time or shootout.
  const KO_START = Date.UTC(2026, 5, 28);
  const knockout = [...results, ...todays.map(x => x.m)].some(m => {
    const ko = kickoffUTC(m); return ko && ko.getTime() >= KO_START;
  });
  const phase = knockout ? "knockout stage (extra time and penalties possible)"
                         : "group stage (matches CAN end in a draw; there is NO extra time or penalties)";

  /* Prefer Claude-written commentary when the environment allows */
  setStatus("Warming up the commentary box\u2026");
  const fmtScore = s => s ? (s[0] + "-" + s[1] + (s.length===4 ? " ("+s[2]+"-"+s[3]+" pens)" : (s[2]==="aet"?" aet":""))) : "not yet confirmed";
  const posOfP = {}; currRows.forEach((r,i) => posOfP[r.p] = i+1);
  try{
    const data = {
      phase: phase,
      roundup_note: "recent_results lists ONLY matches played in the last 24 hours (this is a daily round-up). " +
                    "games_played_in_tournament_total is the running total across all match-days so far. " +
                    "sweepstake_table reflects ALL games played, not just the recent ones.",
      games_in_this_roundup: results.length,
      games_played_in_tournament_total: finished.length,
      recent_results: results.map(m => {
        const s = scores[mKey(m)];
        return {
          team_home: m.a, owner_home: TEAM_TO_PLAYER[m.a] || null,
          team_away: m.b, owner_away: TEAM_TO_PLAYER[m.b] || null,
          score: fmtScore(s)
        };
      }),
      sweepstake_table: currRows.map((r,i) => ({pos: i+1, player: r.p, played: r.P,
        won: r.W, drawn: r.D, lost: r.L, gd: r.GD, points: r.Pts})),
      fixtures: todays.map(x => ({
        kickoff: ukTime(x.ko) + " BST", venue: x.m.g ? venueLabel(x.m.g) : null,
        // The ONLY two teams in this fixture, each with the family member who owns it:
        team_home: x.m.a, owner_home: TEAM_TO_PLAYER[x.m.a] || null,
        team_away: x.m.b, owner_away: TEAM_TO_PLAYER[x.m.b] || null,
        owner_home_position: TEAM_TO_PLAYER[x.m.a] ? posOfP[TEAM_TO_PLAYER[x.m.a]] : null,
        owner_away_position: TEAM_TO_PLAYER[x.m.b] ? posOfP[TEAM_TO_PLAYER[x.m.b]] : null,
        same_owner: TEAM_TO_PLAYER[x.m.a] && TEAM_TO_PLAYER[x.m.a] === TEAM_TO_PLAYER[x.m.b]
      }))
    };
    const prompt =
      "You are a top-class football journalist writing the daily round-up for a family World Cup 2026 sweepstake "
      + "in which each family member owns specific national teams. Write a WhatsApp message in plain text (no markdown, "
      + "no headers), about 150-220 words, in warm, witty, polished prose \u2014 broadsheet-quality football writing with "
      + "a light, affectionate touch. Cover three things: (1) the recent results, with a little colour, naming the family "
      + "owner of each team; (2) how the sweepstake_table looks now; (3) a short preview of each upcoming fixture as a "
      + "friendly duel between the two family owners, noting what a win would mean for their league position.\n\n"
      + "STRICT ACCURACY RULES \u2014 follow exactly:\n"
      + "\u2022 recent_results are ONLY the games from the last 24 hours. Do NOT imply they are the only games of the "
      + "tournament or state a tournament-wide game count from them \u2014 use games_played_in_tournament_total for any total. "
      + "Frame the recap as the latest match-day, not the start of the tournament (unless the total equals the recent count).\n"
      + "\u2022 Mention EVERY match listed in recent_results \u2014 do not omit any. For a match whose score is "
      + "'not yet confirmed', say its result is still to come rather than skipping it.\n"
      + "\u2022 Each fixture has EXACTLY TWO teams: team_home and team_away. Only ever describe those two teams playing each "
      + "other. NEVER introduce a third team and never mention a player's other teams in the context of a match they are not in.\n"
      + "\u2022 owner_home owns team_home; owner_away owns team_away. Attribute correctly. If same_owner is true, that one "
      + "person owns both sides \u2014 say so wittily.\n"
      + "\u2022 Use only the data provided. Do not invent scores, scorers, or events. If a score is 'not yet confirmed', say results are still coming in.\n"
      + "\u2022 This is the " + phase + ". Do NOT mention extra time or penalty shootouts unless the phase is the knockout stage.\n"
      + "\u2022 It is currently the " + (function(){var h=parseInt(new Intl.DateTimeFormat('en-GB',{timeZone:'Europe/London',hour:'numeric',hour12:false}).format(new Date()),10);return h<12?'morning':(h<18?'afternoon':'evening');})() + " in the UK. If you greet, greet for THAT time of day and never reference a different one (no 'good evening' in the morning).\n"
      + "\u2022 After EVERY mention of a country/team name, put its flag emoji immediately after the name (e.g. 'Mexico \ud83c\uddf2\ud83c\uddfd'). Do this for every occurrence.\n"
      + "\u2022 Vary your language; never repeat a stock phrase. Spell every team and player name exactly as given.\n\n"
      + "DATA:\n" + JSON.stringify(data);
    const text = await askClaudeText(prompt);
    return withFlags(text.trim()) + LEADERBOARD_FOOTER;
  }catch(_){
    return withFlags(localCommentary(results, scores, prevRows, currRows, todays, knockout)) + LEADERBOARD_FOOTER;
  }
}

/* ---------- Match-data status (feed diagnostics) ---------- */
function timeAgo(iso){
  if(!iso) return "unknown";
  const ms = Date.now() - new Date(iso).getTime();
  if(isNaN(ms)) return "unknown";
  const mins = Math.round(ms/60000);
  if(mins < 1) return "just now";
  if(mins < 60) return mins + (mins===1?" min ago":" mins ago");
  const hrs = Math.round(mins/60);
  if(hrs < 24) return hrs + (hrs===1?" hour ago":" hours ago");
  const days = Math.round(hrs/24);
  return days + (days===1?" day ago":" days ago");
}
function ukStamp(iso){
  if(!iso) return "";
  try{
    return new Intl.DateTimeFormat("en-GB",{timeZone:"Europe/London",weekday:"short",hour:"2-digit",minute:"2-digit"}).format(new Date(iso));
  }catch(_){ return ""; }
}

async function buildDataStatusMsg(matches, setStatus){
  setStatus("Checking the feed\u2026");
  const N = Date.now();

  // Pull the two published artefacts (same-origin on the hosted site).
  let pub = null, build = null;
  try{ const r = await fetch("scores.json", {cache:"no-store"}); if(r.ok) pub = await r.json(); }catch(_){}
  try{ const r = await fetch("build-status.json", {cache:"no-store"}); if(r.ok) build = await r.json(); }catch(_){}
  const pubScores = (pub && pub.scores) || {};

  const L = [];
  L.push("\ud83d\udce1 MATCH DATA STATUS");
  L.push("");

  if(pub){
    const n = Object.keys(pubScores).length;
    L.push("Published scores (scores.json): " + timeAgo(pub.updated));
    L.push("  \u2022 " + ukStamp(pub.updated) + " UK \u00b7 source: " + (pub.source || "?") + " \u00b7 " + n + " game" + (n===1?"":"s") + " scored");
  } else {
    L.push("Published scores (scores.json): not reachable");
    L.push("  \u2022 (only works on the hosted site; the hourly job writes this file)");
  }
  if(build){
    const d = build.diagnostics || {};
    L.push("Build job last ran: " + timeAgo(build.ran));
    Object.keys(d).forEach(k => L.push("  \u2022 " + k + ": " + d[k]));
    if(build.unmatched && build.unmatched.length) L.push("  \u2022 unmatched names: " + build.unmatched.join(", "));
  }
  L.push("");

  // Matches in the last 24 hours, with score availability.
  const window = matches.map(m => ({m, ko: kickoffUTC(m)}))
    .filter(x => x.ko && inWindow(x.ko, N - DAY, N))
    .sort((a,b) => a.ko - b.ko);

  L.push("LAST 24 HOURS (" + window.length + " match" + (window.length===1?"":"es") + "):");
  if(window.length === 0){
    L.push("  No matches kicked off in the last 24 hours.");
  } else {
    window.forEach(({m, ko}) => {
      const finished = (ko.getTime() + 165*60000) < N;
      const inPlay = !finished && ko.getTime() < N;
      const pubHas = pubScores[m.a + "|" + m.b];
      const liveHas = m.s;   // whatever overlayLive/base resolved
      let status, score = "";
      if(pubHas){ status = "\u2705 published"; score = pubHas[0] + "\u2013" + pubHas[1]; }
      else if(liveHas){ status = "\u2705 in feed (not yet in published file)"; score = liveHas[0] + "\u2013" + liveHas[1]; }
      else if(inPlay){ status = "\ud83d\udd34 kicking off / in play"; }
      else if(finished){ status = "\u23f3 finished \u2014 awaiting score"; }
      else { status = "\u23f1 upcoming"; }
      const label = teamLabel(m.a) + (score ? " " + score + " " : " v ") + teamLabel(m.b);
      L.push("  " + label);
      L.push("     " + ukTime(ko) + " BST \u00b7 " + status);
    });
  }
  L.push("");
  L.push("Checked just now \u00b7 " + ukStamp(new Date().toISOString()) + " UK");
  return L.join("\n");
}

/* ---------- UI wiring ---------- */
const statusEl = document.getElementById("status");
const chatEl = document.getElementById("chat");
const msgEl = document.getElementById("msg");
const btns = [document.getElementById("btnYesterday"), document.getElementById("btnToday"), document.getElementById("btnTomorrow"), document.getElementById("btnLeaderboard"), document.getElementById("btnCommentary"), document.getElementById("btnData")];
const setStatus = s => statusEl.textContent = s;

async function generate(kind){
  btns.forEach(b => b.disabled = true);
  setStatus("Loading match data\u2026");
  chatEl.classList.remove("show");
  try{
    const {matches, live} = await loadMatches();
    const now = new Date();
    let msg;
    const N = now.getTime();
    if(kind === "yesterday"){
      msg = await buildResultsMsg(matches, live, N - DAY, N, setStatus);
    } else if(kind === "commentary"){
      msg = await buildCommentaryMsg(matches, setStatus);
    } else if(kind === "leaderboard"){
      const {finished, scores} = await gatherAllScores(matches, setStatus);
      msg = buildLeaderboardMsg(finished, scores, ukNiceDate(now));
    } else if(kind === "data"){
      msg = await buildDataStatusMsg(matches, setStatus);
    } else if(kind === "tomorrow"){
      msg = await buildFixturesMsg(matches, N + DAY, N + 2*DAY, setStatus, "TOMORROW");
    } else {
      msg = await buildFixturesMsg(matches, N, N + DAY, setStatus, "TODAY");
    }
    msgEl.textContent = msg;
    chatEl.classList.add("show");
    let note = "Ready \u2014 copy it into the family chat.";
    if((kind === "today" || kind === "tomorrow") && buildFixturesMsg.tvError){
      note += " TV channels unavailable \u2014 " + String(buildFixturesMsg.tvError).slice(0,220);
    } else if(askClaude.mode === "no web search (limited)"){
      note += " (This environment blocked web search \u2014 lookups ran on Claude's built-in knowledge, so some channels/scores may be missing.)";
    }
    setStatus(note);
  }catch(e){
    setStatus("Something went wrong (" + e.message + "). Try again in a moment.");
  }finally{
    btns.forEach(b => b.disabled = false);
  }
}

btns[0].addEventListener("click", () => generate("yesterday"));
btns[1].addEventListener("click", () => generate("today"));
btns[2].addEventListener("click", () => generate("tomorrow"));
btns[3].addEventListener("click", () => generate("leaderboard"));
btns[4].addEventListener("click", () => generate("commentary"));
btns[5].addEventListener("click", () => generate("data"));

document.getElementById("btnCopy").addEventListener("click", async () => {
  const text = msgEl.textContent;
  try{
    await navigator.clipboard.writeText(text);
  }catch(_){
    const ta = document.createElement("textarea");
    ta.value = text; document.body.appendChild(ta);
    ta.select(); document.execCommand("copy"); ta.remove();
  }
  setStatus("Copied \u2713 \u2014 paste it into WhatsApp.");
});

document.getElementById("rosterTable").innerHTML = PLAYERS.map(([p, ts]) =>
  "<tr><td>" + p + "</td><td>" + ts.map(teamLabel).join(" &nbsp;&middot;&nbsp; ") + "</td></tr>"
).join("");

document.querySelector(".tick").textContent =
  new Intl.DateTimeFormat("en-GB",{timeZone:"Europe/London",hour:"2-digit",minute:"2-digit"}).format(new Date()) + " \u2713\u2713";
</script>
