<title>The Sweepstake Standings &middot; World Cup 2026</title>

  :root{
    --night:#070D1B;
    --night-2:#0E1830;
    --floodlight:#EAF2FF;
    --chalk:#F5F8FF;
    --grass:#1FA463;
    --grass-dim:#15703F;
    --gold:#FFCB45;
    --silver:#C8D4E6;
    --bronze:#E08A4B;
    --line:rgba(255,255,255,.09);
    --muted:#7E8BA6;
    --win:#36C277;
    --loss:#E5604D;
  }
  *{box-sizing:border-box; margin:0; padding:0}
  html{-webkit-text-size-adjust:100%}
  body{
    font-family:'Outfit',system-ui,sans-serif;
    background:
      radial-gradient(120% 70% at 50% -10%, #16284F 0%, rgba(14,24,48,0) 60%),
      radial-gradient(90% 50% at 50% 110%, #0a2e1e 0%, rgba(7,13,27,0) 55%),
      var(--night);
    color:var(--chalk);
    min-height:100vh;
    padding:26px 16px 60px;
    -webkit-font-smoothing:antialiased;
  }
  .wrap{max-width:600px; margin:0 auto}

  /* ---------- Header ---------- */
  .eyebrow{
    display:flex; align-items:center; gap:8px; justify-content:center;
    font-family:'Roboto Mono',monospace; font-size:11px; letter-spacing:.32em;
    text-transform:uppercase; color:var(--muted); margin-bottom:12px;
  }
  .eyebrow .dot{width:7px; height:7px; border-radius:50%; background:var(--win);
    box-shadow:0 0 0 0 rgba(54,194,119,.6); animation:pulse 2.4s infinite}
  @keyframes pulse{
    0%{box-shadow:0 0 0 0 rgba(54,194,119,.55)}
    70%{box-shadow:0 0 0 9px rgba(54,194,119,0)}
    100%{box-shadow:0 0 0 0 rgba(54,194,119,0)}
  }
  h1{
    font-family:'Bebas Neue',sans-serif; font-weight:400;
    font-size:clamp(46px,13vw,78px); line-height:.92; text-align:center;
    letter-spacing:.01em; color:var(--floodlight);
    text-shadow:0 2px 30px rgba(120,170,255,.25);
  }
  h1 .accent{color:var(--gold)}
  .sub{text-align:center; color:var(--muted); font-size:13.5px; margin-top:10px;
    font-weight:300; letter-spacing:.01em}
  .sub b{color:var(--chalk); font-weight:600}

  /* ---------- Podium ---------- */
  .podium{
    display:grid; grid-template-columns:1fr 1.15fr 1fr; gap:10px;
    align-items:end; margin:34px 0 10px;
  }
  .plinth{
    position:relative; border-radius:14px 14px 8px 8px; padding:16px 8px 14px;
    text-align:center; background:linear-gradient(180deg, var(--night-2), #0a1326);
    border:1px solid var(--line); overflow:hidden;
  }
  .plinth::before{content:''; position:absolute; inset:0 0 auto 0; height:3px}
  .p1::before{background:var(--gold)}
  .p2::before{background:var(--silver)}
  .p3::before{background:var(--bronze)}
  .p1{padding-top:24px}
  .medal{font-size:24px; line-height:1; height:28px; display:flex; align-items:center; justify-content:center; font-variant-emoji:emoji}
  .plinth .nm{font-weight:600; font-size:16px; margin-top:8px; letter-spacing:.01em}
  .plinth .pts{font-family:'Bebas Neue',sans-serif; font-size:34px; line-height:1; margin-top:4px}
  .p1 .pts{color:var(--gold)} .p2 .pts{color:var(--silver)} .p3 .pts{color:var(--bronze)}
  .plinth .ptlabel{font-family:'Roboto Mono',monospace; font-size:9px; letter-spacing:.2em;
    text-transform:uppercase; color:var(--muted)}
  .plinth .teams{font-size:18px; margin-top:8px; letter-spacing:1px}
  .bar{height:6px; margin:14px -8px -14px; }
  .p1 .bar{background:linear-gradient(90deg, transparent, var(--gold), transparent)}
  .p2 .bar{background:linear-gradient(90deg, transparent, var(--silver), transparent)}
  .p3 .bar{background:linear-gradient(90deg, transparent, var(--bronze), transparent)}

  /* ---------- Table ---------- */
  .board{
    margin-top:22px; border:1px solid var(--line); border-radius:16px;
    background:linear-gradient(180deg, rgba(20,32,62,.5), rgba(10,18,38,.5));
    overflow:hidden;
  }
  .thead, .row{
    display:grid;
    grid-template-columns:30px 1fr 30px 64px 42px 40px;
    align-items:center; gap:6px; padding:11px 14px;
  }
  .thead{
    font-family:'Roboto Mono',monospace; font-size:9.5px; letter-spacing:.16em;
    text-transform:uppercase; color:var(--muted);
    border-bottom:1px solid var(--line); background:rgba(0,0,0,.18);
  }
  .thead .r-num{text-align:center}
  .row{border-bottom:1px solid var(--line); transition:background .2s}
  .row:last-child{border-bottom:none}
  .row:nth-child(even){background:rgba(255,255,255,.012)}
  .row.top3{background:rgba(255,203,69,.04)}
  .r-num{font-family:'Bebas Neue',sans-serif; font-size:22px; text-align:center;
    color:var(--muted); line-height:1}
  .row.top3 .r-num{color:var(--gold)}
  .r-name{font-weight:600; font-size:15.5px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis}
  .r-name .flags{font-size:13px; color:var(--muted); margin-left:6px; letter-spacing:1px}
  .r-pld{font-family:'Roboto Mono',monospace; font-size:13px; text-align:center; color:var(--muted)}
  .r-wdl{font-family:'Roboto Mono',monospace; font-size:12.5px; text-align:center; letter-spacing:1px}
  .r-wdl .w{color:var(--win)} .r-wdl .l{color:var(--loss)}
  .r-gd{font-family:'Roboto Mono',monospace; font-size:13px; text-align:center; color:var(--muted)}
  .r-gd.pos{color:var(--win)} .r-gd.neg{color:var(--loss)}
  .r-pts{font-family:'Bebas Neue',sans-serif; font-size:26px; text-align:center; line-height:1}
  .thead .r-pts{font-family:'Roboto Mono',monospace; font-size:9.5px}
  .row.top3 .r-pts{color:var(--gold)}

  .empty{padding:50px 24px; text-align:center; color:var(--muted)}
  .empty .big{font-family:'Bebas Neue',sans-serif; font-size:30px; color:var(--chalk); letter-spacing:.02em}
  .empty p{margin-top:8px; font-size:14px; font-weight:300}

  /* ---------- Footer ---------- */
  .foot{display:flex; align-items:center; justify-content:space-between; gap:10px;
    margin-top:18px; padding:0 4px; flex-wrap:wrap}
  .legend{font-family:'Roboto Mono',monospace; font-size:10px; color:var(--muted); letter-spacing:.05em}
  .refresh{display:flex; align-items:center; gap:7px; font-family:'Roboto Mono',monospace;
    font-size:10.5px; color:var(--muted); letter-spacing:.04em}
  .refresh button{
    font-family:'Roboto Mono',monospace; font-size:10.5px; letter-spacing:.08em;
    color:var(--chalk); background:transparent; border:1px solid var(--line);
    border-radius:999px; padding:6px 13px; cursor:pointer; text-transform:uppercase;
    transition:border-color .2s, color .2s;
  }
  .refresh button:hover{border-color:var(--win); color:var(--win)}
  .refresh button:active{transform:scale(.97)}
  .spin{animation:spin 1s linear infinite; display:inline-block}
  @keyframes spin{to{transform:rotate(360deg)}}

  .pending{text-align:center; font-family:'Roboto Mono',monospace; font-size:10.5px;
    color:var(--muted); margin-top:14px; letter-spacing:.03em; opacity:.8}

  @media (max-width:420px){
    .thead, .row{grid-template-columns:26px 1fr 26px 58px 38px 36px; gap:4px; padding:10px 11px}
    .r-name{font-size:14px}
    .plinth .nm{font-size:14px}
    .plinth .teams{font-size:15px}
  }
  @media (prefers-reduced-motion: reduce){ *{animation:none !important; transition:none !important} }
</style>
</head>

</div>

  "Ivory Coast":"\ud83c\udde8\ud83c\uddee","Japan":"\ud83c\uddef\ud83c\uddf5","Jordan":"\ud83c\uddef\ud83c\uddf4","Mexico":"\ud83c\uddf2\ud83c\uddfd","Morocco":"\ud83c\uddf2\ud83c\udde6",
  "Netherlands":"\ud83c\uddf3\ud83c\uddf1","New Zealand":"\ud83c\uddf3\ud83c\uddff","Norway":"\ud83c\uddf3\ud83c\uddf4","Panama":"\ud83c\uddf5\ud83c\udde6",
  "Paraguay":"\ud83c\uddf5\ud83c\uddfe","Portugal":"\ud83c\uddf5\ud83c\uddf9","Qatar":"\ud83c\uddf6\ud83c\udde6","Saudi Arabia":"\ud83c\uddf8\ud83c\udde6",
  "Scotland":"\ud83c\udff4\udb40\udc67\udb40\udc62\udb40\udc73\udb40\udc63\udb40\udc74\udb40\udc7f","Senegal":"\ud83c\uddf8\ud83c\uddf3","South Africa":"\ud83c\uddff\ud83c\udde6","South Korea":"\ud83c\uddf0\ud83c\uddf7",
  "Spain":"\ud83c\uddea\ud83c\uddf8","Sweden":"\ud83c\uddf8\ud83c\uddea","Switzerland":"\ud83c\udde8\ud83c\udded","Tunisia":"\ud83c\uddf9\ud83c\uddf3","Turkey":"\ud83c\uddf9\ud83c\uddf7",
  "USA":"\ud83c\uddfa\ud83c\uddf8","Uruguay":"\ud83c\uddfa\ud83c\uddfe","Uzbekistan":"\ud83c\uddfa\ud83c\uddff"
};


const DATA_URL = "https://raw.githubusercontent.com/openfootball/worldcup.json/master/2026/worldcup.json";
const mKey = m => m.a + "|" + m.b + "|" + m.d;

function kickoffUTC(m){
  if(!m.d) return null;
  const [y,mo,d] = m.d.split("-").map(Number);
  if(!m.t) return new Date(Date.UTC(y, mo-1, d, 12, 0));
  const t = m.t.match(/(\d{1,2}):(\d{2})/);
  const off = m.t.match(/UTC([+-])(\d{1,2})(?::(\d{2}))?/);
  let h = t ? +t[1] : 12, min = t ? +t[2] : 0, offMin = 0;
  if(off){ offMin = (+off[2])*60 + (off[3]?+off[3]:0); if(off[1]==="-") offMin = -offMin; }
  return new Date(Date.UTC(y, mo-1, d, h, min) - offMin*60000);
}
const teamFlags = (a,b) => (FLAGS[a]||"") + (FLAGS[b]||"");

async function loadMatches(){
  try{
    const ctl = new AbortController();
    const timer = setTimeout(() => ctl.abort(), 7000);
    const r = await fetch(DATA_URL, {cache:"no-store", signal:ctl.signal});
    clearTimeout(timer);
    if(!r.ok) throw 0;
    const j = await r.json();
    return (j.matches || []).map(m => {
      let s;
      const sc = m.score;
      if(sc && (sc.ft || sc.et)){ s = (sc.et || sc.ft).slice(); if(sc.ps) s = s.concat(sc.ps); else if(sc.et) s.push("aet"); }
      return {d:m.date, t:m.time,
        a: typeof m.team1==="object"?m.team1.name:m.team1,
        b: typeof m.team2==="object"?m.team2.name:m.team2, s};
    });
  }catch(_){ return EMBEDDED_MATCHES.slice(); }
}

function buildTable(matches){
  const now = Date.now();
  const finished = matches.filter(m => {
    const ko = kickoffUTC(m);
    return ko && (ko.getTime()+165*60000) < now && FLAGS[m.a] && FLAGS[m.b] && m.s;
  });
  const table = {};
  PLAYERS.forEach(([p, ts]) => table[p] = {P:0,W:0,D:0,L:0,GF:0,GA:0, teams:ts});
  finished.forEach(m => {
    const s = m.s; const pens = s.length===4 ? [s[2],s[3]] : null;
    [[m.a,s[0],s[1], pens?pens[0]-pens[1]:0],[m.b,s[1],s[0], pens?pens[1]-pens[0]:0]].forEach(([team,gf,ga,pd])=>{
      const p = TEAM_TO_PLAYER[team]; if(!p) return;
      const r = table[p]; r.P++; r.GF+=gf; r.GA+=ga;
      if(gf>ga) r.W++; else if(gf<ga) r.L++; else if(pens){ pd>0?r.W++:r.L++; } else r.D++;
    });
  });
  const rows = PLAYERS.map(([p]) => { const r=table[p];
    return {p, ...r, GD:r.GF-r.GA, Pts:r.W*3+r.D}; })
    .sort((x,y)=> y.Pts-x.Pts || y.GD-x.GD || y.GF-x.GF || x.p.localeCompare(y.p));
  return {rows, played: finished.length};
}

function gdStr(gd){ return (gd>0?"+":"") + gd; }

function render(rows, played){
  const sub = document.getElementById("sub");
  const podium = document.getElementById("podium");
  const board = document.getElementById("board");

  if(played === 0){
    podium.style.display = "none";
    sub.innerHTML = "The tournament is about to begin";
    board.innerHTML = '<div class="empty"><div class="big">No goals yet</div>' +
      '<p>The table wakes up the moment the first whistle blows. Check back after kick-off.</p></div>';
    document.getElementById("pending").textContent = "";
    return;
  }

  const leader = rows[0];
  sub.innerHTML = "<b>" + leader.p + "</b> leads after <b>" + played + "</b> match" + (played===1?"":"es") + " played";

  /* Podium: order 2-1-3 for visual centre */
  const top3 = rows.slice(0,3);
  if(top3.length === 3){
    podium.style.display = "grid";
    const cell = (r, place) => {
      const medals = {1:"\ud83e\udd47",2:"\ud83e\udd48",3:"\ud83e\udd49"};
      return '<div class="plinth p'+place+'">' +
        '<div class="medal">'+medals[place]+'</div>' +
        '<div class="nm">'+r.p+'</div>' +
        '<div class="pts">'+r.Pts+'</div><div class="ptlabel">points</div>' +
        '<div class="teams">'+teamFlags(r.teams[0],r.teams[1])+'</div>' +
        '<div class="bar"></div></div>';
    };
    podium.innerHTML = cell(top3[1],2) + cell(top3[0],1) + cell(top3[2],3);
  } else {
    podium.style.display = "none";
  }

  /* Full table */
  let pos = 0, prev = null;
  const body = rows.map((r,i) => {
    const sig = r.Pts+"|"+r.GD+"|"+r.GF;
    if(sig !== prev){ pos = i+1; prev = sig; }
    const top = pos <= 3 ? " top3" : "";
    const wdl = '<span class="w">'+r.W+'</span> '+r.D+' <span class="l">'+r.L+'</span>';
    const gdcls = r.GD>0?"pos":(r.GD<0?"neg":"");
    return '<div class="row'+top+'">' +
      '<div class="r-num">'+pos+'</div>' +
      '<div class="r-name">'+r.p+'<span class="flags">'+teamFlags(r.teams[0],r.teams[1])+'</span></div>' +
      '<div class="r-pld">'+r.P+'</div>' +
      '<div class="r-wdl">'+wdl+'</div>' +
      '<div class="r-gd '+gdcls+'">'+gdStr(r.GD)+'</div>' +
      '<div class="r-pts">'+r.Pts+'</div>' +
      '</div>';
  }).join("");
  board.innerHTML =
    '<div class="thead"><div class="r-num">#</div><div>Player</div>' +
    '<div class="r-pld">Pl</div><div class="r-wdl">W&middot;D&middot;L</div>' +
    '<div class="r-gd">GD</div><div class="r-pts">Pts</div></div>' + body;

  const total = PLAYERS.length * 2 * 3; // rough; not shown
  document.getElementById("pending").textContent = "";
}

function stamp(){
  const t = new Intl.DateTimeFormat("en-GB",{timeZone:"Europe/London",hour:"2-digit",minute:"2-digit"}).format(new Date());
  document.getElementById("stamp").textContent = "Updated " + t;
}

async function refresh(manual){
  const btn = document.getElementById("refreshBtn");
  if(manual){ btn.innerHTML = '<span class="spin">&#8635;</span> &nbsp;'; }
  const matches = await loadMatches();
  const {rows, played} = buildTable(matches);
  render(rows, played);
  stamp();
  if(manual){ btn.innerHTML = "&#8635; Refresh"; }
}

document.getElementById("refreshBtn").addEventListener("click", () => refresh(true));
refresh(false);
setInterval(() => refresh(false), 5*60*1000); // auto every 5 min
</script>
