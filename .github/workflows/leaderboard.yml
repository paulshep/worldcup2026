name: Daily leaderboard rebuild

on:
  schedule:
    - cron: "0 7 * * *"
    - cron: "0 13 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  rebuild:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Rebuild leaderboard.html
        env:
          API_FOOTBALL_KEY: ${{ secrets.API_FOOTBALL_KEY }}
        run: python build_leaderboard_action.py
      - name: Commit if changed
        run: |
          git config user.name "sweepstake-bot"
          git config user.email "actions@github.com"
          git add -A leaderboard.html scores.json build-status.json 2>/dev/null || true
          if [ -n "$(git status --porcelain)" ]; then
            git commit -m "Daily leaderboard rebuild [skip ci]"
            git push
          else
            echo "No changes to commit"
          fi
