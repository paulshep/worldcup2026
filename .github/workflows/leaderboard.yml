name: Hourly leaderboard rebuild

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  rebuild:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Rebuild leaderboard.html
        run: python build_leaderboard_action.py
      - name: Commit if changed
        run: |
          git config user.name "sweepstake-bot"
          git config user.email "actions@github.com"
          for f in leaderboard.html scores.json build-status.json; do
            [ -f "$f" ] && git add "$f"
          done
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Hourly leaderboard rebuild [skip ci]"
            git push
          fi
